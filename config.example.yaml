# Example configuration for the Pi Home Automation Appliance Provisioning
# Framework. Copy this file, adjust the values, and run:
#
#   sudo ./setup.py my-config.yaml
#
# Homebridge and WireGuard are mandatory and always installed. This first
# iteration of the framework does not yet implement mqtt / pai /
# sprinklerd / aqualinkd -- they're left commented out below as a preview
# of where they'll plug in once added.

system:
  hostname: PI_FOUR
  vnc: true

homebridge:
  bridge_name: Pool Hub
  port: 8581
  pin: "031-45-154"

  plugins:
    homebridge-shelly:
      enabled: true
    homebridge-camera-ui:
      enabled: true

wireguard:
  endpoint: vpn.example.com:51820
  server_pubkey: "rEHMVhHPkXWanRwZsfbIG3yeNHggOiZdeNpzPEzClBk="
  address: 10.10.0.2/24
  allowed_ips: 0.0.0.0/0
  persistent_keepalive: 25

