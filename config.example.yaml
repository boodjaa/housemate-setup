# Example configuration for House-Mate provisioning
# Create a copy of this file and make changes before running
#
#   sudo ./setup.py path-to-config.yaml
#
# Homebridge and WireGuard are mandatory and always installed,
# as is basic system configuration.

base:
  hostname: raspberrypi
  ssh: true
  vnc: true
  healthcheck: healthcheck-url-uid-here

wireguard:
  endpoint: vpn.example.com:51820
  server_pubkey: "rEHMVhHPkXWanRwZsfbIG3yeNHggOiZdeNpzPEzClBk="
  address: 10.100.0.2/24
  allowed_ips: 10.100.0.1/24 
  persistent_keepalive: 25

mqtt:
  listener: 1883
  allow_anonymous: true

pai:
  enabled: true
  endpoint: 192.168.1.50
  pc_password: "0000"
  mqtt_host: 127.0.0.1
  interface_password: paradox

aqualinkd:
  enabled: true
  panel_type: RS-8 Combo
  mqtt_address: 127.0.0.1

homebridge:
  client_id: default
  port: 51826
  pin: "123-45-678"
  ui_port: 8581

  plugins:
    # ---------------------------------------------------------
    # CUSTOM TRANSFORMERS (Complex Logic)
    # ---------------------------------------------------------

    homebridge-mqttthing:
      enabled: true
      # host: "127.0.0.1:1883"  # Optional. Defaults to 127.0.0.1:1883. 
                                # "mqtt://" prefix is added automatically if missing.
      accessories:              # Required. Dictionary of arbitrary keys -> accessory configs.
        paradox_alarm:          # Arbitrary key
          name: "Paradox Alarm" # Required
          type: "securitySystem" # Required. Allowed: securitySystem, motionSensor, contactSensor, switch, lightbulb
          current_state: "paradox/states/partitions/Area_1/current_state"
          get_target: "paradox/states/partitions/Area_1/target_state"
          set_target: "paradox/control/partitions/Area_1"
          # Optional arrays (comma-separated strings or lists work)
          target_values: "armed_home, armed_away, armed_night, disarmed"
          current_values: "armed_home, armed_away, armed_night, disarmed, triggered"
          restrict_state: "0, 1, 2, 3" 
        motion_sensor_1:
          name: "Zone 1 Motion"
          type: "motionSensor"
          motion_detected: "paradox/states/zones/Zone_01/open"
          # Note: onValue/offValue are hardcoded to "True"/"False" for this type

    homebridge-denon-tv:
      enabled: true
      # name: "Denon TV"        # Optional. Defaults to "Denon TV".
      # child_bridge: true      # Optional framework field
      devices:                  # Required. Dictionary of arbitrary keys -> device configs.
        living_room_avr:        # Arbitrary key
          name: "Living Room AVR" # Required
          host: "192.168.0.254"   # Required
          zone_control: 0         # Optional (becomes zoneControl)
          generation: 1           # Optional
          info_button_command: "MNMEN ON" # Optional (becomes infoButtonCommand)
          # power:                # Optional dict (snake_case keys auto-converted)
          #   on: "PWON"
          # volume:               # Optional dict
          #   up: "MVUP"
          # buttons:              # Optional list of dicts
          #   - name: "Netflix"
          #     command: "NS9B"

    # ---------------------------------------------------------
    # DECLARATIVE TRANSFORMERS (Flat / Auto-Converted)
    # ---------------------------------------------------------
    # Rule: All fields (except framework ones) pass through.
    # Rule: snake_case automatically becomes camelCase.

    homebridge-2-0-shelly:
      enabled: true
      # admin:                  # Hardcoded to {"enabled": true} by the transformer!
      #   enabled: true
      some_custom_field: "value" # Becomes someCustomField in JSON

    homebridge-camera-ffmpeg:
      enabled: true
      cameras:                  # Passed through as a list
        - name: "Front Door"
          source: "-rtsp_transport tcp -i rtsp://192.168.1.10/stream"

    homebridge-daikin-local:
      enabled: true
      api_route: "192.168.0.254" # Becomes apiRoute in JSON

    homebridge-google-nest-sdm:
      enabled: true
      project_id: "your-project-id" # Becomes projectId in JSON

    homebridge-broadlink-rm:
      enabled: true
      hosts:
        - address: "192.168.1.20"

    homebridge-samsung-tizen:
      enabled: true
      devices:
        - name: "Samsung TV"
          ip: "192.168.1.30"
          mac: "AA:BB:CC:DD:EE:FF"

    # --- The following plugins accept standard flat/nested fields ---
    homebridge-kasa-python:
      enabled: true
    homebridge-google-smarthome:
      enabled: true
    homebridge-landroid:
      enabled: true
    homebridge-appletv-enhanced:
      enabled: true
    homebridge-connexoon:
      enabled: true
    homebridge-tahoma:
      enabled: true
    homebridge-plex:
      enabled: true
    homebridge-weather-plus:
      enabled: true
    homebridge-network-presence:
      enabled: true
    homebridge-tplink-smarthome:
      enabled: true
    homebridge-tapo:
      enabled: true
    homebridge-hisense-tv:
      enabled: true
    homebridge-ueboom:
      enabled: true