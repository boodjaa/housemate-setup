# Example configuration for House-Mate provisioning
# Create a copy of this file and make changes before running
#
#   sudo ./setup.py path-to-config.yaml
#
# Homebridge and WireGuard are mandatory and always installed,
# as is basic system configuration.

base:
  hostname: raspberrypi
  ssh: true
  vnc: true
  healthcheck: healthcheck-url-uid-here

wireguard:
  endpoint: vpn.example.com:51820
  server_pubkey: "rEHMVhHPkXWanRwZsfbIG3yeNHggOiZdeNpzPEzClBk="
  address: 10.100.0.2/24
  allowed_ips: 10.100.0.1/24 
  persistent_keepalive: 25

mqtt:
  listener: 1883
  allow_anonymous: true

pai:
  enabled: true
  endpoint: 192.168.1.50
  pc_password: "0000"
  mqtt_host: 127.0.0.1
  interface_password: paradox

aqualinkd:
  enabled: true
  panel_type: RS-8 Combo
  mqtt_address: 127.0.0.1

homebridge:
  client_id: default
  port: 51826
  pin: "123-45-678"
  ui_port: 8581

  plugins:
    homebridge-shelly:
      enabled: true
    homebridge-denon-tv:
      enabled: true
      acc_name: Main Room Amp
      host: 192.168.0.254
      generation: 1
      zone: 4 # 4: Zone1+2
    homebridge-broadlink-rm-pro:
      enabled: true
    homebridge-mqttthing:
      enabled: true
      host: 127.0.0.1:1883
      accessories:
        paradox_alarm:
          name: Paradox Alarm
          type: securitySystem
          current_state: paradox/states/partitions/Area_1/current_state
          get_target: paradox/states/partitions/Area_1/target_state
          set_target: paradox/control/partitions/Area_1
          target_values:
            armed_home,
            armed_away,
            armed_night,
            disarmed
          current_values:
            armed_home,
            armed_away,
            armed_night,
            disarmed,
            triggered
          restrict_state: 0, 1, 2, 3
        zone_1:
          name: Zone 1
          type: motionSensor
          motion_detected: paradox/states/zones/Zone_01/open
    homebridge-camera-ffmpeg:
      enabled: true
    homebridge-daikin-local:
      enabled: true
      acc_name: Daikin Aircon
      fan_name: Kitchen Fan
      api_route: 192.168.0.254
    homebridge-google-nest-sdm:
      enabled: true
    homebridge-network-presence:
      enabled: true
    homebridge-samsung-tizen:
      enabled: true
    homebridge-sprinklerd:
      enabled: true
    homebridge-tahoma:
      enabled: true